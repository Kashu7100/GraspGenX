# UR10e arm cuRobo kinematics template (collision spheres + self-collision
# buffers for the 7 arm links). Consumed by build_ur10e_gripper.py to
# assemble the merged UR10e + <gripper> cuRobo config, so the build is
# self-contained (no dependency on a previously-built gripper config).
# Arm sphere geometry originates from cuRobo's ur10e robot config.
